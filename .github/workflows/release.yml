name: Release AsciiDraw

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: AsciiDraw-windows
          - os: macos-latest
            rid: osx-arm64
            artifact: AsciiDraw-macos-arm64
          - os: macos-26-intel
            rid: osx-x64
            artifact: AsciiDraw-macos-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: AsciiDraw-linux
    runs-on: ${{ matrix.os }}
    env:
      PUBLISH_DIR: AsciiDraw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Stamp version from tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $proj = "AsciiDraw.csproj"
          (Get-Content $proj) -replace "<Version>[^<]*</Version>", "<Version>$ver</Version>" | Set-Content $proj
          Write-Host "Stamped version: $ver"
      - name: Publish (Native AOT, self-contained)
        run: dotnet publish AsciiDraw.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ${{ env.PUBLISH_DIR }}
      - name: Strip debug symbols
        shell: pwsh
        run: |
          # NativeAOT symbol files: *.pdb (Windows), *.dbg (Linux), *.dSYM dirs (macOS)
          Get-ChildItem ${{ env.PUBLISH_DIR }} -Recurse -Include *.pdb, *.dbg -File | Remove-Item -Force
          Get-ChildItem ${{ env.PUBLISH_DIR }} -Recurse -Filter *.dSYM -Directory | Remove-Item -Recurse -Force
      - name: Zip publish
        shell: pwsh
        run: Compress-Archive -Path ${{ env.PUBLISH_DIR }} -DestinationPath ${{ matrix.artifact }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: AsciiDraw ${{ github.ref_name }}
          files: "*.zip"
